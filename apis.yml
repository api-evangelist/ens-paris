---
aid: ens-paris
name: École Normale Supérieure de Paris
description: >-
  École Normale Supérieure de Paris (ENS, rue d'Ulm) is a leading French grande
  école and constituent member of Université PSL (Paris Sciences & Lettres),
  ranked #86 in the QS World University Rankings 2025. ENS operates 15
  departments, 35 research laboratories and a network of libraries. ENS does not
  publish a first-party developer portal or documented institutional API; its
  programmatic surface is reached indirectly via national French research and
  higher-education open infrastructure. Researcher output is deposited in the
  HAL-ENS open archive, which is harvestable through the national HAL OAI-PMH
  endpoint and the HAL REST/Search API, and ENS establishment data is exposed
  through the Ministry of Higher Education (MESR) open-data platform's
  Opendatasoft Explore API.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/ens-paris/refs/heads/main/apis.yml
