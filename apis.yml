apis:
  - aid: ens-paris:hal-oai-pmh
    name: HAL-ENS Open Archive (OAI-PMH)
    description: >-
      HAL-ENS is the open archive hosting the scientific production of ENS Paris
      researchers, teacher-researchers and doctoral students. It is part of the
      national HAL platform and is harvestable via the OAI-PMH protocol; ENS
      content can be retrieved by collection sets. No registration is required to
      use the HAL OAI server.
    humanURL: https://api.archives-ouvertes.fr/docs/oai
    baseURL: https://api.archives-ouvertes.fr/oai/hal/
    tags: [ Open Access, Research, Institutional Repository, OAI-PMH, Metadata ]
    properties:
      - type: Documentation
        url: https://api.archives-ouvertes.fr/docs/oai
  - aid: ens-paris:hal-api
    name: HAL Search / REST API
    description: >-
      The national HAL open-archive REST and Search API provides programmatic
      query access to publication metadata, including records deposited in the
      HAL-ENS portal. Results can be filtered by collection, document type and
      discipline.
    humanURL: https://api.hal.science/docs/
    baseURL: https://api.archives-ouvertes.fr/search/
    tags: [ Open Access, Research, Search, Publications, Metadata ]
    properties:
      - type: Documentation
        url: https://api.hal.science/docs/
  - aid: ens-paris:mesr-opendata
    name: MESR Higher Education Open Data (Explore API)
    description: >-
      The French Ministry of Higher Education, Research and Innovation (MESR)
      open-data platform exposes establishment, enrolment and research datasets
      via an Opendatasoft Explore API. ENS Paris appears as an establishment in
      these national datasets; this is a third-party platform, not operated by
      ENS itself.
    humanURL: https://data.enseignementsup-recherche.gouv.fr/api/explore/v2.1/console
    baseURL: https://data.enseignementsup-recherche.gouv.fr/api/explore/v2.1/
    tags: [ Open Data, Higher Education, Statistics, Government, France ]
    properties:
